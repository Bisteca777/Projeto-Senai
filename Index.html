<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENAI Minas Gerais — Combate ao Bullying</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    /* ══════════════════════════════════════════
       DESIGN TOKENS
    ══════════════════════════════════════════ */
    :root {
      --azul:          #003DA5;
      --azul-escuro:   #002270;
      --azul-claro:    #1A5CC8;
      --azul-medio:    #0050CC;
      --laranja:       #F47920;
      --laranja-claro: #FF9A3C;
      --laranja-escuro:#C95F05;
      --branco:        #FFFFFF;
      --cinza-claro:   #F2F5FB;
      --cinza-medio:   #8A9BBD;
      --cinza-borda:   #D8E0F0;
      --texto:         #0E1A36;
      --texto-leve:    #4A5878;
      --sucesso:       #16A34A;
      --alerta:        #DC2626;

      --shadow-card: 0 4px 24px rgba(0,61,165,0.10);
      --shadow-btn:  0 4px 16px rgba(244,121,32,0.35);
      --radius:      14px;
      --radius-lg:   22px;
      --transition:  all .25s cubic-bezier(.4,0,.2,1);
    }

    /* ══════════════════════════════════════════
       RESET & BASE
    ══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--texto);
      background: var(--branco);
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4, h5 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      line-height: 1.15;
    }

    p { line-height: 1.75; color: var(--texto-leve); }

    a { text-decoration: none; color: inherit; }

    img { display: block; max-width: 100%; }

    /* ══════════════════════════════════════════
       PÁGINA ATIVA / NAVEGAÇÃO
    ══════════════════════════════════════════ */
    .page { display: none; }
    .page.active { display: block; }

    /* ══════════════════════════════════════════
       NAVBAR
    ══════════════════════════════════════════ */
    #navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(0,34,112,.97);
      backdrop-filter: blur(12px);
      border-bottom: 2px solid rgba(244,121,32,.25);
      transition: var(--transition);
    }

    .nav-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
    }

    /* Logo */
    .nav-logo {
      display: flex; align-items: center; gap: 12px; cursor: pointer;
    }
    .nav-logo-badge {
      background: var(--laranja);
      border-radius: 8px;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Montserrat', sans-serif;
      font-weight: 900; font-size: .75rem;
      color: #fff;
      letter-spacing: .04em;
      flex-shrink: 0;
      line-height: 1.1;
      text-align: center;
    }
    .nav-logo-text {
      display: flex; flex-direction: column; line-height: 1.1;
    }
    .nav-logo-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800; font-size: 1.1rem;
      color: #fff; letter-spacing: .02em;
    }
    .nav-logo-sub {
      font-family: 'Inter', sans-serif;
      font-size: .68rem; font-weight: 500;
      color: var(--laranja-claro); letter-spacing: .08em; text-transform: uppercase;
    }

    /* Links nav */
    .nav-links {
      display: flex; align-items: center; gap: .25rem; list-style: none;
    }
    .nav-links li a {
      padding: .45rem .9rem;
      border-radius: 8px;
      font-size: .88rem; font-weight: 500;
      color: rgba(255,255,255,.82);
      transition: var(--transition);
      white-space: nowrap;
    }
    .nav-links li a:hover,
    .nav-links li a.nav-active {
      color: #fff;
      background: rgba(255,255,255,.1);
    }
    .nav-links li a.nav-active {
      color: var(--laranja-claro);
    }

    /* CTA nav */
    .btn-nav-cta {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--laranja);
      color: #fff !important;
      padding: .5rem 1.25rem !important;
      border-radius: 50px !important;
      font-weight: 700 !important; font-size: .88rem !important;
      box-shadow: var(--shadow-btn);
      transition: var(--transition) !important;
      white-space: nowrap;
    }
    .btn-nav-cta:hover {
      background: var(--laranja-claro) !important;
      transform: translateY(-1px);
      background: none !important;
      background-color: var(--laranja-claro) !important;
    }
    .btn-nav-cta svg { width: 15px; height: 15px; }

    /* Hamburger */
    .nav-hamburger {
      display: none; flex-direction: column; gap: 5px;
      background: none; border: none; cursor: pointer; padding: 6px;
    }
    .nav-hamburger span {
      display: block; width: 24px; height: 2px;
      background: #fff; border-radius: 2px; transition: var(--transition);
    }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* Mobile menu */
    .nav-mobile {
      display: none; position: absolute;
      top: 68px; left: 0; right: 0;
      background: rgba(0,34,112,.98);
      border-bottom: 2px solid rgba(244,121,32,.2);
      padding: 1rem 2rem 1.5rem;
    }
    .nav-mobile.open { display: block; }
    .nav-mobile ul { list-style: none; display: flex; flex-direction: column; gap: .25rem; }
    .nav-mobile ul li a {
      display: block; padding: .65rem .75rem;
      border-radius: 8px; font-size: .95rem; font-weight: 500;
      color: rgba(255,255,255,.85); transition: var(--transition);
    }
    .nav-mobile ul li a:hover { background: rgba(255,255,255,.08); color: #fff; }
    .nav-mobile .btn-nav-cta { margin-top: .75rem; display: inline-flex; width: 100%; justify-content: center; }

    /* ══════════════════════════════════════════
       BOTÕES GLOBAIS
    ══════════════════════════════════════════ */
    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--laranja);
      color: #fff;
      padding: .85rem 2rem;
      border-radius: 50px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700; font-size: .95rem;
      border: none; cursor: pointer;
      box-shadow: var(--shadow-btn);
      transition: var(--transition);
    }
    .btn-primary:hover {
      background: var(--laranja-claro);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(244,121,32,.4);
    }
    .btn-primary:active { transform: translateY(0); }

    .btn-outline {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: transparent;
      color: #fff;
      padding: .85rem 2rem;
      border-radius: 50px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700; font-size: .95rem;
      border: 2px solid rgba(255,255,255,.6);
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-outline:hover {
      background: rgba(255,255,255,.12);
      border-color: #fff;
    }

    .btn-azul {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--azul);
      color: #fff;
      padding: .85rem 2rem;
      border-radius: 50px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700; font-size: .95rem;
      border: none; cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 4px 16px rgba(0,61,165,.25);
    }
    .btn-azul:hover {
      background: var(--azul-claro);
      transform: translateY(-2px);
    }

    /* ══════════════════════════════════════════
       SEÇÕES COMUNS
    ══════════════════════════════════════════ */
    .section-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .section-label {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(0,61,165,.08);
      color: var(--azul-claro);
      border: 1px solid rgba(0,61,165,.18);
      border-radius: 50px;
      padding: .3rem .9rem;
      font-size: .78rem; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      color: var(--texto);
      margin-bottom: .75rem;
    }
    .section-title span { color: var(--azul); }
    .section-title .accent { color: var(--laranja); }

    /* Animação de entrada */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes pulse-ring {
      0%   { transform: scale(.9); opacity: .7; }
      70%  { transform: scale(1.15); opacity: 0; }
      100% { transform: scale(.9); opacity: 0; }
    }

    .anim-up  { animation: fadeUp .7s ease both; }
    .anim-in  { animation: fadeIn .6s ease both; }
    .d1 { animation-delay: .1s; }
    .d2 { animation-delay: .22s; }
    .d3 { animation-delay: .34s; }
    .d4 { animation-delay: .46s; }
    .d5 { animation-delay: .58s; }

    /* ══════════════════════════════════════════
       PAGE: HOME
    ══════════════════════════════════════════ */

    /* Hero */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex; align-items: center;
      overflow: hidden;
      background: var(--azul-escuro);
    }
    .hero-bg {
      position: absolute; inset: 0;
      background:
        linear-gradient(135deg, rgba(0,34,112,.96) 0%, rgba(0,61,165,.80) 50%, rgba(0,80,200,.6) 100%);
      z-index: 1;
    }
    /* Formas geométricas decorativas */
    .hero-geo {
      position: absolute; inset: 0; z-index: 0; overflow: hidden;
    }
    .hero-geo::before {
      content: '';
      position: absolute;
      width: 680px; height: 680px;
      border-radius: 50%;
      border: 1.5px solid rgba(244,121,32,.18);
      right: -140px; top: -180px;
    }
    .hero-geo::after {
      content: '';
      position: absolute;
      width: 460px; height: 460px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,.07);
      right: 60px; top: -40px;
    }
    .hero-geo-dot {
      position: absolute;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(244,121,32,.14) 0%, transparent 70%);
      right: 80px; top: 60px;
      z-index: 0;
    }
    .hero-stripe {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--laranja) 0%, var(--laranja-claro) 50%, var(--azul-claro) 100%);
      z-index: 2;
    }

    .hero-content {
      position: relative; z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 7rem 1.5rem 5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: center;
    }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(244,121,32,.18);
      border: 1px solid rgba(244,121,32,.35);
      border-radius: 50px;
      padding: .35rem 1rem;
      color: var(--laranja-claro);
      font-size: .78rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      margin-bottom: 1.25rem;
    }
    .hero-badge span { width: 7px; height: 7px; border-radius: 50%; background: var(--laranja-claro); display: block; }

    .hero-title {
      font-size: clamp(2.4rem, 5vw, 4rem);
      color: #fff;
      line-height: 1.08;
      margin-bottom: 1.25rem;
    }
    .hero-title .hl { color: var(--laranja-claro); }

    .hero-desc {
      font-size: 1.05rem;
      color: rgba(255,255,255,.8);
      line-height: 1.75;
      margin-bottom: 2rem;
      max-width: 520px;
    }

    .hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; }

    /* Estatísticas hero */
    .hero-stats {
      display: flex; gap: 2rem; margin-top: 2.5rem;
      flex-wrap: wrap;
    }
    .hero-stat { text-align: left; }
    .hero-stat-num {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900; font-size: 2rem;
      color: #fff; line-height: 1;
    }
    .hero-stat-num span { color: var(--laranja-claro); }
    .hero-stat-label { font-size: .78rem; color: rgba(255,255,255,.6); margin-top: 2px; }

    /* Card hero direito */
    .hero-card {
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: var(--radius-lg);
      padding: 2rem;
    }
    .hero-card-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem; font-weight: 700;
      color: var(--laranja-claro);
      letter-spacing: .06em; text-transform: uppercase;
      margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: 8px;
    }
    .hero-card-title svg { width: 18px; height: 18px; }
    .hero-pillar {
      display: flex; align-items: flex-start; gap: 12px;
      padding: .9rem 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .hero-pillar:last-child { border-bottom: none; }
    .hero-pillar-icon {
      width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(244,121,32,.18);
    }
    .hero-pillar-icon svg { width: 18px; height: 18px; color: var(--laranja-claro); }
    .hero-pillar-text strong {
      display: block; font-size: .9rem; font-weight: 700;
      color: #fff; margin-bottom: 2px;
      font-family: 'Montserrat', sans-serif;
    }
    .hero-pillar-text p { font-size: .8rem; color: rgba(255,255,255,.6); line-height: 1.5; margin: 0; }

    /* Seção Pilares */
    .pillars-section {
      padding: 6rem 0;
      background: var(--cinza-claro);
    }
    .pillars-header { text-align: center; margin-bottom: 3.5rem; }
    .pillars-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
    }
    .pillar-card {
      background: #fff;
      border: 1px solid var(--cinza-borda);
      border-radius: var(--radius-lg);
      padding: 2rem 1.5rem;
      text-align: center;
      box-shadow: var(--shadow-card);
      transition: var(--transition);
      position: relative; overflow: hidden;
    }
    .pillar-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: var(--laranja);
      transform: scaleX(0); transform-origin: left;
      transition: transform .35s ease;
    }
    .pillar-card:hover { transform: translateY(-5px); box-shadow: 0 12px 36px rgba(0,61,165,.14); }
    .pillar-card:hover::before { transform: scaleX(1); }
    .pillar-icon {
      width: 60px; height: 60px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem;
      background: linear-gradient(135deg, rgba(0,61,165,.1) 0%, rgba(0,80,200,.06) 100%);
    }
    .pillar-icon svg { width: 28px; height: 28px; color: var(--azul); }
    .pillar-card h3 {
      font-size: 1.05rem; color: var(--texto);
      margin-bottom: .6rem;
    }
    .pillar-card p { font-size: .87rem; }

    /* Frases de Prosperidade */
    .quotes-section {
      padding: 5rem 0;
      background: linear-gradient(135deg, var(--azul-escuro) 0%, var(--azul) 60%, var(--azul-claro) 100%);
      position: relative; overflow: hidden;
    }
    .quotes-section::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .quotes-header { text-align: center; margin-bottom: 3rem; position: relative; z-index: 1; }
    .quotes-header .section-label { background: rgba(244,121,32,.15); color: var(--laranja-claro); border-color: rgba(244,121,32,.3); }
    .quotes-header .section-title { color: #fff; }
    .quotes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      position: relative; z-index: 1;
    }
    .quote-card {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: var(--radius-lg);
      padding: 2rem;
      transition: var(--transition);
    }
    .quote-card:hover {
      background: rgba(255,255,255,.11);
      transform: translateY(-3px);
    }
    .quote-mark {
      font-family: 'Montserrat', sans-serif;
      font-size: 4rem; font-weight: 900;
      color: var(--laranja-claro);
      line-height: .8;
      margin-bottom: .5rem;
      opacity: .7;
    }
    .quote-text {
      font-size: 1rem; font-weight: 500;
      color: rgba(255,255,255,.92);
      line-height: 1.65;
      font-style: italic;
      margin-bottom: 1rem;
    }
    .quote-author {
      font-size: .8rem; font-weight: 700;
      color: var(--laranja-claro);
      letter-spacing: .06em; text-transform: uppercase;
    }

    /* CTA Section */
    .cta-section {
      padding: 6rem 0;
      background: #fff;
    }
    .cta-box {
      background: linear-gradient(135deg, var(--azul) 0%, var(--azul-claro) 100%);
      border-radius: var(--radius-lg);
      padding: 4rem 3rem;
      text-align: center;
      position: relative; overflow: hidden;
      box-shadow: 0 16px 56px rgba(0,61,165,.25);
    }
    .cta-box::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: rgba(244,121,32,.12);
      right: -150px; top: -200px;
    }
    .cta-box::after {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: rgba(255,255,255,.05);
      left: -80px; bottom: -100px;
    }
    .cta-box-content { position: relative; z-index: 1; }
    .cta-box h2 {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      color: #fff; margin-bottom: .75rem;
    }
    .cta-box p { color: rgba(255,255,255,.8); max-width: 580px; margin: 0 auto 2rem; }
    .cta-box .cta-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }

    /* ══════════════════════════════════════════
       PAGE: INFORMAÇÕES
    ══════════════════════════════════════════ */
    .page-hero {
      background: linear-gradient(135deg, var(--azul-escuro) 0%, var(--azul) 100%);
      padding: 8rem 1.5rem 4rem;
      text-align: center;
      position: relative; overflow: hidden;
    }
    .page-hero::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 5px;
      background: linear-gradient(90deg, var(--laranja), var(--laranja-claro));
    }
    .page-hero h1 { color: #fff; font-size: clamp(1.8rem, 4vw, 3rem); margin-bottom: .75rem; }
    .page-hero p { color: rgba(255,255,255,.78); max-width: 640px; margin: 0 auto; }

    .info-section { padding: 5rem 0; }
    .info-intro {
      max-width: 800px; margin: 0 auto 4rem;
      text-align: center;
    }
    .info-intro p { font-size: 1.05rem; }

    .tipos-title {
      font-size: clamp(1.4rem, 3vw, 2rem);
      color: var(--texto); margin-bottom:
